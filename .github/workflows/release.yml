name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          python -m pytest tests/ -v

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/never_dry/manifest.json'))['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi

      - name: Package integration
        run: |
          # Zip the CONTENTS of the integration dir at the archive root (not the
          # never_dry/ folder itself): HACS extracts the zip INTO
          # custom_components/never_dry/, so a top-level never_dry/ folder would
          # produce a broken custom_components/never_dry/never_dry/ nesting and
          # the integration would not be discovered. Exclude __pycache__ so
          # compiled bytecode never ships in the release.
          cd custom_components/never_dry
          zip -r ../../never_dry.zip . -x '*__pycache__*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: never_dry.zip
